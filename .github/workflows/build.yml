name: Build Arsenal
on:
  push:
    branches: [ main ] # Срабатывает при пуше в main

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y python3-dev build-essential libffi-dev git 
          sudo apt install -y libgirepository1.0-dev libcairo2-dev gir1.2-gtk-3.0

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          python -m pip install briefcase

      - name: Build and Package App
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            briefcase package linux appimage --no-input --no-docker
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            # Собираем сразу и DMG, и PKG (Briefcase по умолчанию делает один формат, 
            # но мы можем запустить сборку дважды или оставить стандартный)
            briefcase package macOS --no-input --adhoc-sign
          fi
        shell: bash

      - name: Upload Artifacts (Internal)
        uses: actions/upload-artifact@v4
        with:
          name: arsenal-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: latest
          name: Latest Continuous Build
          body: "Автоматическая сборка проекта Арсенал. Внимание: macOS версия требует снятия карантина (xattr -cr)."
          draft: false
          prerelease: true
          files: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.pkg
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
