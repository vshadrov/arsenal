name: Build Arsenal
on: [push]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Briefcase
        run: pip install briefcase

      - name: Build App
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            # Собираем AppImage и DEB (system)
            briefcase package linux appimage --no-input
            briefcase package linux system --no-input
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Собираем установщик MSI для Windows
            briefcase package windows msi --no-input
          else
            # Собираем приложение для macOS
            briefcase package macOS app --no-input
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arsenal-dist-${{ matrix.os }}
          path: dist/*
